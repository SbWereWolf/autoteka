---
# yamllint disable rule:line-length
services:
  php:
    build:
      context: ${AUTOTEKA_ROOT:-..}
      dockerfile: deploy/docker/php/Dockerfile
      target: dev
    container_name: autoteka-dev-php
    working_dir: /workspace/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://127.0.0.1:8081}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-database/database.sqlite}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      XDEBUG_MODE: ${BACKEND_XDEBUG_MODE:-debug,develop}
      XDEBUG_START_WITH_REQUEST: ${BACKEND_XDEBUG_START_WITH_REQUEST:-yes}
      XDEBUG_CLIENT_HOST: ${BACKEND_XDEBUG_CLIENT_HOST:-host.docker.internal}
      XDEBUG_CLIENT_PORT: ${BACKEND_XDEBUG_CLIENT_PORT:-9003}
      XDEBUG_IDEKEY: ${BACKEND_XDEBUG_IDEKEY:-VSCODE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${AUTOTEKA_ROOT:-..}/backend:/workspace/backend
      - autoteka_backend_vendor:/workspace/backend/vendor
    restart: unless-stopped

  frontend:
    build:
      context: ${AUTOTEKA_ROOT:-..}
      dockerfile: deploy/docker/dev/frontend/Dockerfile
    container_name: autoteka-dev-frontend
    working_dir: /workspace/frontend
    environment:
      FRONTEND_MODE: ${FRONTEND_MODE:-source}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      FRONTEND_HMR_PROTOCOL: ${FRONTEND_HMR_PROTOCOL:-ws}
      FRONTEND_HMR_HOST: ${FRONTEND_HMR_HOST:-localhost}
      FRONTEND_HMR_PORT: ${FRONTEND_HMR_PORT:-8081}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_BUILD_SOURCEMAP: ${VITE_BUILD_SOURCEMAP:-true}
    volumes:
      - ${AUTOTEKA_ROOT:-..}/frontend:/workspace/frontend
      - autoteka_frontend_node_modules:/workspace/frontend/node_modules
      - autoteka_frontend_dist:/workspace/frontend/dist
    restart: unless-stopped

  web:
    build:
      context: ${AUTOTEKA_ROOT:-..}
      dockerfile: deploy/docker/dev/nginx/Dockerfile
    container_name: autoteka-dev-web
    depends_on:
      - php
      - frontend
    environment:
      FRONTEND_MODE: ${FRONTEND_MODE:-source}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Authorization,Content-Type,Accept,Origin,X-Requested-With}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-Content-Length,Content-Range}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
      API_CACHE_TTL: ${API_CACHE_TTL:-3600}
    volumes:
      - ${AUTOTEKA_ROOT:-..}/frontend:/workspace/frontend:ro
      - autoteka_frontend_dist:/workspace/frontend/dist:ro
      - ${AUTOTEKA_ROOT:-..}/backend:/workspace/backend:ro
    ports:
      - "${DEV_BIND_HOST:-127.0.0.1}:${DEV_WEB_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  autoteka_backend_vendor:
  autoteka_frontend_node_modules:
  autoteka_frontend_dist:
