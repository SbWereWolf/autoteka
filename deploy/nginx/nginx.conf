server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # HTML всегда проверяем заново, чтобы подтягивались актуальные hashed assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Вход на метрики без 403: отдаём статичную страницу из /metrics/index.html
    location = /metrics {
        return 302 /metrics/;
    }

    # JSON с метриками всегда свежий
    location = /metrics/data.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Страница метрик может кешироваться долго
    location = /metrics/index.html {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /metrics/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ /metrics/index.html;
    }

    # Vite build assets: можно кешировать долго, имя файла меняется при каждой сборке
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MoonShine/Laravel static assets
    location ^~ /vendor/moonshine/ {
        root /var/www/backend/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ @laravel;
    }

    # API: CORS обслуживаем на уровне nginx (включая preflight)
    location ~ ^/api(/|$) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Max-Age "86400" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type "text/plain; charset=utf-8";
            return 204;
        }

        try_files $uri $uri/ @laravel;
    }

    # Все backend-маршруты Laravel (кроме /api, он обработан выше)
    location ~ ^/admin(/|$) {
        try_files $uri $uri/ @laravel;
    }

    # Public статика без хэша: не кешируем, чтобы правки были видны сразу
    location ~* ^/(generated|bg)/.+\.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # SPA (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location @laravel {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass php:9000;
    }
}
