model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Prepare a policy-compliant commit only when the user explicitly asks for
it.

Use only:
pwsh "scripts/agent/commit.ps1" `
    -Message "<a short summary of the changes>" `
    -Body "<Explain why the changes were made>" `
    -AISystemName "<AI system name>" `
    -LLMName "<LLM name>"

Enforce:
- no forbidden paths staged;
- subject length <= 50 chars;
- body length <= 72 chars on each line;
- body multiline and policy-compliant.

Never push.
"""
