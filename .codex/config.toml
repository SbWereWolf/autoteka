# Codex project config: commit helper agent
# https://developers.openai.com/codex/multi-agent

[agents]
max_threads = 4
max_depth = 1

[agents.commit_helper]
description = "Lint all changed/new files, then create commits per project rules. Use when user asks to commit, or before finalizing changes."
config_file = "agents/commit-helper.toml"
