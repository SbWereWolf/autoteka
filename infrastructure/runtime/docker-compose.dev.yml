---
services:
  php:
    image: autoteka/runtime-php:dev
    build:
      context: ${AUTOTEKA_ROOT}
      dockerfile: ${INFRA_ROOT:?INFRA_ROOT must be set}/runtime/docker/php/Dockerfile
      additional_contexts:
        infra: ${INFRA_ROOT:?INFRA_ROOT must be set}
      target: dev
    container_name: autoteka-dev-php
    working_dir: /workspace/backend
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: ${DB_CONNECTION}
      SESSION_DRIVER: ${SESSION_DRIVER}
      CACHE_STORE: ${CACHE_STORE}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      XDEBUG_MODE: ${BACKEND_XDEBUG_MODE}
      XDEBUG_START_WITH_REQUEST: ${BACKEND_XDEBUG_START_WITH_REQUEST}
      XDEBUG_CLIENT_HOST: ${BACKEND_XDEBUG_CLIENT_HOST}
      XDEBUG_CLIENT_PORT: ${BACKEND_XDEBUG_CLIENT_PORT}
      XDEBUG_IDEKEY: ${BACKEND_XDEBUG_IDEKEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${AUTOTEKA_ROOT}/backend:/workspace/backend
      - autoteka_api_vendor:/workspace/backend/apps/ShopAPI/vendor
      - autoteka_admin_vendor:/workspace/backend/apps/ShopOperator/vendor
      - autoteka_shopapi_bootstrap_cache:/workspace/backend/apps/ShopAPI/bootstrap/cache
      - autoteka_shopoperator_bootstrap_cache:/workspace/backend/apps/ShopOperator/bootstrap/cache
      - autoteka_shopapi_storage_framework:/workspace/backend/apps/ShopAPI/storage/framework
      - autoteka_shopoperator_storage_framework:/workspace/backend/apps/ShopOperator/storage/framework
    restart: unless-stopped

  frontend:
    image: autoteka/runtime-frontend:dev
    build:
      context: ${AUTOTEKA_ROOT}
      dockerfile: ${INFRA_ROOT:?INFRA_ROOT must be set}/runtime/docker/dev/frontend/Dockerfile
      additional_contexts:
        infra: ${INFRA_ROOT:?INFRA_ROOT must be set}
    container_name: autoteka-dev-frontend
    working_dir: /workspace/frontend
    environment:
      FRONTEND_MODE: ${FRONTEND_MODE}
      FRONTEND_PORT: ${FRONTEND_PORT}
      FRONTEND_HMR_PROTOCOL: ${FRONTEND_HMR_PROTOCOL}
      FRONTEND_HMR_HOST: ${FRONTEND_HMR_HOST}
      FRONTEND_HMR_PORT: ${FRONTEND_HMR_PORT}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_BUILD_SOURCEMAP: ${VITE_BUILD_SOURCEMAP}
    volumes:
      - ${AUTOTEKA_ROOT}/frontend:/workspace/frontend
      - autoteka_frontend_node_modules:/workspace/frontend/node_modules
      - autoteka_frontend_dist:/workspace/frontend/dist
    restart: unless-stopped

  web:
    image: autoteka/runtime-web:dev
    build:
      context: ${AUTOTEKA_ROOT}
      dockerfile: ${INFRA_ROOT:?INFRA_ROOT must be set}/runtime/docker/dev/nginx/Dockerfile
      additional_contexts:
        infra: ${INFRA_ROOT:?INFRA_ROOT must be set}
    container_name: autoteka-dev-web
    depends_on:
      - php
      - frontend
    environment:
      FRONTEND_MODE: ${FRONTEND_MODE:-source}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
      CORS_ALLOW_METHODS:
        ${CORS_ALLOW_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOW_HEADERS:
        ${CORS_ALLOW_HEADERS:-Authorization,Content-Type,Accept,Origin,X-Requested-With}
      CORS_EXPOSE_HEADERS: >-
        ${CORS_EXPOSE_HEADERS:-Content-Length,Content-Range}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
      API_CACHE_TTL: ${API_CACHE_TTL:-3600}
      API_CACHE_CONTROL_GET:
        ${API_CACHE_CONTROL_GET:-public, max-age=${API_CACHE_TTL:-3600}}
      API_CACHE_CONTROL_MUTATION:
        ${API_CACHE_CONTROL_MUTATION:-no-store,no-cache,must-revalidate,max-age=0}
    volumes:
      - ${AUTOTEKA_ROOT}/frontend:/workspace/frontend:ro
      - autoteka_frontend_dist:/workspace/frontend/dist:ro
      - ${AUTOTEKA_ROOT}/backend:/workspace/backend:ro
    ports:
      - "${DEV_BIND_HOST}:${DEV_WEB_PORT}:80"
    restart: unless-stopped

volumes:
  autoteka_api_vendor:
  autoteka_admin_vendor:
  autoteka_shopapi_bootstrap_cache:
  autoteka_shopoperator_bootstrap_cache:
  autoteka_shopapi_storage_framework:
  autoteka_shopoperator_storage_framework:
  autoteka_frontend_node_modules:
  autoteka_frontend_dist:
