[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data
clear_env = no
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
catch_workers_output = yes
decorate_workers_output = no
ping.path = /fpm-ping
pm.status_path = /fpm-status
