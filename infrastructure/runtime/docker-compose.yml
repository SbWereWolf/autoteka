---
services:
  php:
    image: autoteka/runtime-php:prod
    build:
      context: ${AUTOTEKA_ROOT}
      dockerfile: ${INFRA_ROOT:?INFRA_ROOT must be set}/runtime/docker/php/Dockerfile
      additional_contexts:
        infra: ${INFRA_ROOT:?INFRA_ROOT must be set}
      target: prod
    container_name: ${AUTOTEKA_RUNTIME_INSTANCE:-autoteka}-php
    restart: unless-stopped
    working_dir: /var/www/backend
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
    healthcheck:
      test: >-
        SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping
        REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000
        | grep -q 'pong'
      interval: ${PHP_HC_INTERVAL}
      timeout: ${PHP_HC_TIMEOUT}
      retries: ${PHP_HC_RETRIES}
      start_period: ${PHP_HC_START_PERIOD}
    volumes:
      - autoteka_backend_database:/var/www/backend/database
      - autoteka_backend_storage:/var/www/backend/storage
      - autoteka_backend_admin_vendor:/var/www/backend/apps/ShopOperator/public/vendor

  web:
    image: autoteka/runtime-web:prod
    build:
      context: ${AUTOTEKA_ROOT}
      dockerfile: ${INFRA_ROOT:?INFRA_ROOT must be set}/runtime/docker/prod/nginx/Dockerfile
      additional_contexts:
        infra: ${INFRA_ROOT:?INFRA_ROOT must be set}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        FRONTEND_BUILD_SOURCEMAP: ${FRONTEND_BUILD_SOURCEMAP}
    container_name: ${AUTOTEKA_RUNTIME_INSTANCE:-autoteka}-http
    restart: unless-stopped
    depends_on:
      - php
    environment:
      API_CACHE_TTL: ${API_CACHE_TTL}
    healthcheck:
      test: >-
        wget -q -O- http://127.0.0.1/healthcheck
        >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    ports:
      - "${HTTP_BIND_HOST}:${HTTP_PORT}:80"
    volumes:
      - "${INFRA_ROOT:?INFRA_ROOT must be set}/observability/application/metrics:/usr/share/nginx/html/metrics:ro"
      - autoteka_backend_storage:/var/www/backend/storage:ro
      - autoteka_backend_admin_vendor:/usr/share/nginx/backend-public/vendor:ro

volumes:
  autoteka_backend_database:
    name: "${AUTOTEKA_RUNTIME_INSTANCE:-autoteka}_backend_database"
  autoteka_backend_storage:
    name: "${AUTOTEKA_RUNTIME_INSTANCE:-autoteka}_backend_storage"
  autoteka_backend_admin_vendor:
    name: "${AUTOTEKA_RUNTIME_INSTANCE:-autoteka}_backend_admin_vendor"
